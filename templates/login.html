<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACPET - Acesse sua Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="page-container">
        <div class="left-red-bar"></div>

        <main class="login-section">

            <div class="dots-top"></div>

            <div class="login-content">
                <div class="logo-container">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="MACPET Indústria de Embalagens" class="logo">
                </div>

                <div class="title-container">
                    <h2>
                        <span class="red-triangle"></span>
                        ACESSE SUA CONTA
                    </h2>
                    <p class="subtitle">INFORME SEU CPF PARA CONTINUAR</p>
                </div>

                <form action="/" method="POST">
                    <div class="input-group">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </span>
                        <input
                            type="text"
                            id="cpf"
                            name="cpf"
                            placeholder="000.000.000-00"
                            maxlength="14"
                            autocomplete="off"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">ENTRAR</button>
                </form>
            </div>

            <div class="dots-bottom"></div>
        </main>

        <aside class="image-section"></aside>
    </div>

    <script>
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', () => {
            let value = cpfInput.value.replace(/\D/g, ''); // Remove tudo que não for número
            if (value.length > 3) value = value.slice(0, 3) + '.' + value.slice(3);
            if (value.length > 7) value = value.slice(0, 7) + '.' + value.slice(7);
            if (value.length > 11) value = value.slice(0, 11) + '-' + value.slice(11);
            cpfInput.value = value;
        });
    </script>
</body>
</html>
