<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Pesquisa - MACPET</title>
  <!-- Usa exatamente o mesmo CSS da outra tela -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/lista_pesquisa.css') }}">
</head>
<body>

  <div class="app">

    <!-- SIDEBAR PADRONIZADA -->
    <aside class="sidebar">
      <div class="logo">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="MACPET - Indústria de Embalagens PET">
      </div>

      <nav class="sidebar-nav">
        <a href="{{ url_for('admin.lista_pesquisas') }}" class="nav-item">
          <span class="nav-icon">📋</span>
          <span>Pesquisas</span>
        </a>
        <!-- Se desejar manter a opção de Nova Pesquisa na sidebar: -->
        <a href="{{ url_for('admin.nova_pesquisa') }}" class="nav-item active">
          <span class="nav-icon">➕</span>
          <span>Nova Pesquisa</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="{{ url_for('logout') }}" class="nav-item">
          <span class="nav-icon">↪</span>
          <span>Sair do sistema</span>
        </a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- HEADER PADRONIZADO -->
      <header class="page-header">
        <div>
          <h1><strong>Nova</strong> Pesquisa</h1>
          <p class="subtitle">Crie sua pesquisa e adicione as perguntas</p>
        </div>
      </header>

      <!-- FORMULÁRIO DENTRO DO PAINEL PADRÃO -->
      <section class="panel" style="padding: 32px;">
        <form action="{{ url_for('admin.nova_pesquisa') }}" method="POST" enctype="multipart/form-data">

          <h2 style="margin-bottom: 24px; color: var(--red); font-size: 18px;">| Dados da Pesquisa</h2>

          <div style="display: flex; flex-direction: column; gap: 20px;">

            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px;">Título da pesquisa *</label>
              <input type="text" name="titulo" placeholder="Ex: Pesquisa de Satisfação" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
            </div>

            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px;">Descrição</label>
              <textarea name="descricao" placeholder="Descreva o objetivo da sua pesquisa..." rows="3" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: inherit;"></textarea>
            </div>

            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px;">Imagem do banner (opcional)</label>
              <input type="file" name="banner" accept="image/*" style="width: 100%; padding: 10px; border: 1px dashed var(--border); border-radius: var(--radius-sm); background: var(--bg-page);">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div>
                <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px;">Data de início *</label>
                <input type="date" name="data_inicio" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
              </div>
              <div>
                <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px;">Data de término *</label>
                <input type="date" name="data_fim" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
              </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px;">
              <button type="reset" class="page-btn" style="padding: 12px 24px; height: auto;">LIMPAR</button>
              <button type="submit" class="btn-primary">CRIAR PESQUISA</button>
            </div>

          </div>

        </form>
      </section>

    </main>

  </div>

</body>
</html>
